<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP Auto-system | Premium Smart Solutions</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0f0f0f; /* Deeper black for luxury */
            --light: #f8f9fa;
            --gray: #1a1a1a;
            --heading-font: 'Montserrat', sans-serif;
            --body-font: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--body-font);
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%; /* Increased padding for elegance */
            background: rgba(15, 15, 15, 0.98);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-family: var(--heading-font);
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            align-items: center;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            position: relative;
            margin-left: 10px;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            padding: 10px 15px;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--gold); }

        /* Dropdown Logic */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: var(--gray);
            min-width: 220px;
            box-shadow: 0px 15px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px 0;
            z-index: 100;
        }

        .dropdown-content a {
            text-transform: none; /* Sublinks look better in normal case */
            display: block;
            padding: 12px 20px;
            letter-spacing: 0.5px;
        }

        .dropdown:hover .dropdown-content {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Specialized Button in Nav */
        .nav-btn {
            border: 1px solid var(--gold);
            padding: 8px 20px !important;
            margin-left: 20px;
            border-radius: 2px;
        }

        .nav-btn:hover {
            background: var(--gold);
            color: var(--dark) !important;
        }

        /* Hero Section */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1558002038-1055907df827?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-attachment: fixed; /* Parallax effect */
            padding: 0 20px;
        }

        .hero h1 {
            font-family: var(--heading-font);
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* Responsive text size */
